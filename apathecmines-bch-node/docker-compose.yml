version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: apathecmines-bch-node_web_1
      APP_PORT: 80

  init:
    image: alpine:3.19
    volumes:
      - ${APP_DATA_DIR}:/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache wget > /dev/null 2>&1
        REPO=https://raw.githubusercontent.com/apathec/apathecmines-umbrel-store/main/apathecmines-bch-node
        mkdir -p /data/web
        wget -qO /data/web/index.html $$REPO/index.html
        wget -qO /data/nginx.conf $$REPO/nginx.conf
        echo "Init complete"

  web:
    image: nginx:1.25-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/web:/usr/share/nginx/html:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      init:
        condition: service_completed_successfully
      node:
        condition: service_started

  node:
    image: theretromike/nodes:bitcoincash
    restart: on-failure
    stop_grace_period: 15m
    volumes:
      - ${APP_DATA_DIR}/.bitcoincash:/root/.bitcoin
    ports:
      - 9002:9002
      - 7002:7002
      - 8334:8334
    entrypoint: "bitcoind -printtoconsole -server -txindex=1 -rest=1 -zmqpubhashblock=tcp://0.0.0.0:7002 -zmqpubrawblock=tcp://0.0.0.0:7002 -zmqpubrawtx=tcp://0.0.0.0:7002 -rpcbind=0.0.0.0 -rpcport=9002 -rpcallowip=0.0.0.0/0 -port=8334 -rpcuser=apathecpool -rpcpassword=Xk9mT4vQp2wL7nRz8Hc3jYf6sDb1u -maxconnections=64"

  dozzle:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    restart: on-failure
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
