description: |
  A full Bitcoin Cash node running BCHN v29.0.0 with transaction indexing (txindex=1), REST API, and no pruning.

  Provides RPC, ZMQ, and P2P services for the ApathecMines solo mining suite. Features a galaxy-themed sync status dashboard with black hole progress visualization.

  Ports: RPC 9002 · ZMQ 7002 · P2P 8334

  Part of the ApathecMines suite — install AM BCH Solo on top of this node to start solo mining BCH.
