
services:

  bchn:
    image: theretromike/nodes:bitcoincash
    container_name: apathecmines-bchn-node
    restart: unless-stopped
    network_mode: host
    volumes:
      - bchn-node-data:/root/.bitcoin

  web:
    image: nginx:alpine
    container_name: apathecmines-node-web
    restart: unless-stopped
    ports:
      - "3081:80"
    volumes:
      - ${APP_DATA_DIR}/web:/usr/share/nginx/html:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  bchn-node-data:
