server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Miningcore API — runs on host network port 4000
    location /api/ {
        proxy_pass http://192.168.4.39:4000/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # BCH Node RPC — port 9002
    location /node/bch/ {
        proxy_pass http://192.168.4.39:9002/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Basic YXBhdGhlY3Bvb2w6WGs5bVQ0dlFwMndMN25SejhIYzNqWWY2c0RiMXU=";
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 30s;
    }

    # BCH Node REST API (for sync status)
    location /rest/bch/ {
        proxy_pass http://192.168.4.39:9002/rest/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Dozzle log viewer
    location /logs/ {
        proxy_pass http://dozzle:8080/logs/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
