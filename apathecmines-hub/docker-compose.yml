version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: apathecmines-hub_web_1
      APP_PORT: 80

  init:
    image: alpine:3.19
    volumes:
      - ${APP_DATA_DIR}:/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache wget > /dev/null 2>&1
        REPO=https://raw.githubusercontent.com/apathec/apathecmines-umbrel-store/main/apathecmines-hub
        mkdir -p /data/web /data/pgdata
        [ -f /data/web/index.html ] || wget -qO /data/web/index.html $$REPO/index.html
        [ -f /data/nginx.conf ] || wget -qO /data/nginx.conf $$REPO/nginx.conf
        [ -f /data/config.json ] || wget -qO /data/config.json $$REPO/config.json
        [ -f /data/coins.json ] || wget -qO /data/coins.json $$REPO/coins.json
        [ -f /data/init.sql ] || wget -qO /data/init.sql $$REPO/init.sql
        echo "Init complete"

  web:
    image: nginx:1.25-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/web:/usr/share/nginx/html:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      init:
        condition: service_completed_successfully
      miningcore:
        condition: service_started

  miningcore:
    image: theretromike/miningcore
    restart: on-failure
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/config.json:/app/config.json:ro
      - ${APP_DATA_DIR}/coins.json:/app/build/coins.json:ro
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: miningcore
      POSTGRES_PASSWORD: Qm7vRt2pXk9LbWc4NyJh8FzD3sUa6Tg1
      POSTGRES_DB: miningcore
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth=md5"
    volumes:
      - ${APP_DATA_DIR}/pgdata:/var/lib/postgresql/data
      - ${APP_DATA_DIR}/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "5433:5432"

  dozzle:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    restart: on-failure
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
